    <div><b class=sml>채널 퍼널 (유입→주문 품질)</b><table><tr><th>채널</th><th>CTR</th><th>유입→주문</th><th>주문당유입</th></tr>
     ${funRow('메타',{ctr:null,i2o:f.meta_i2o,per_order:'-'})}${funRow('구글',f.gg)}${funRow('틱톡',f.tk)}</table></div>
    <div><b class=sml>틱톡 스케일 곡선 (지출구간별)</b><table><tr><th>구간</th><th>광고비</th><th>ROAS</th><th>수</th></tr>${(dp.scale&&dp.scale.tk||[]).map(scRow).join('')}</table></div>
   </div>
   <div class=grid2 style=margin-top:14px>
    <div><b class=sml style=color:#51cf66>숨은보석 (저CTR·고전환→확대)</b><table><tr><th>소재</th><th>CTR</th><th>전환</th><th>ROAS</th></tr>${(dp.gems||[]).map(gemRow).join('')}</table></div>
    <div><b class=sml style=color:#ff6b6b>낚시성 (고CTR·저전환→종료)</b><table><tr><th>소재</th><th>CTR</th><th>전환</th><th>ROAS</th></tr>${(dp.fishing||[]).map(gemRow).join('')}</table></div>
   </div>
   ${dp.pmax&&dp.pmax.amt?`<div class=sml style=margin-top:10px>구글 PMAX: 직접매출 ${fmtN(dp.pmax.amt)} · 주문 ${dp.pmax.cnt} (캠페인 자동최적화, 소재분해 불가)</div>`:'<div class=sml style=margin-top:10px>구글 PMAX: 미운영</div>'}
   </div>`;
}
function renderDeep(dp){
  if(lchart)lchart.destroy();
  const wk=dp.weekly.map(w=>w.wk);
  lchart=new Chart(document.getElementById('lcv'),{type:'line',
   data:{labels:wk,datasets:[
    {label:'메타',data:dp.weekly.map(w=>w.meta),borderColor:'#845ef7',tension:.3},
    {label:'틱톡',data:dp.weekly.map(w=>w.tk),borderColor:'#51cf66',tension:.3},
    {label:'구글',data:dp.weekly.map(w=>w.gg),borderColor:'#f59f00',tension:.3}]},
   options:{plugins:{legend:{labels:{color:'#c8ccda'}}},scales:{
    x:{ticks:{color:'#c8ccda'},grid:{color:'#222'}},
    y:{ticks:{color:'#c8ccda'},grid:{color:'#222'},title:{display:true,text:'직접ROAS',color:'#8b90a0'}}}}});
}
function render(b){
  const d=DATA[b];
  const T=d.totals;
  const order=['틱톡','메타','구글'];
  const trow=k=>{const t=T[k];return `<tr><td>${k}</td><td>${fmtN(t[0])}</td><td>${fmtN(t[1])}</td><td class=${cls(t[2])} style=font-size:15px>${t[2].toFixed(2)}</td><td>${fmtN(t[3])}</td><td>${fmtN(t[4])}</td><td>${t[5]}</td><td>${fmtN(t[6])}</td><td>${fmtN(t[7])}</td></tr>`};
  let h=`<div class=note>${d.note}</div>
   <div class=card><h2>채널별 총량 (직접ROAS)</h2>
    <table><tr><th>채널</th><th>광고비</th><th>직접매출</th><th>직접ROAS</th><th>주문</th><th>유입</th><th>전환%</th><th>CPA</th><th>객단가</th></tr>
    ${order.map(trow).join('')}</table>
    <div class=chwrap style=margin-top:16px><canvas id=cv height=150></canvas></div></div>`;
  h+=chSection('틱톡',d.ch['틱톡'],d.cov['틱톡']);
  h+=chSection('구글',d.ch['구글'],d.cov['구글']);
  if(d.deep)h+=deepSection(d.deep);
  document.getElementById('app').innerHTML=h;
  if(chart)chart.destroy();
  if(d.deep)renderDeep(d.deep);
  chart=new Chart(document.getElementById('cv'),{type:'bar',
   data:{labels:order,datasets:[
    {label:'직접ROAS',data:order.map(k=>T[k][2]),backgroundColor:'#3b5bdb',yAxisID:'y'},
    {label:'CPA(원)',data:order.map(k=>T[k][6]),backgroundColor:'#f59f00',yAxisID:'y1'}]},
   options:{plugins:{legend:{labels:{color:'#c8ccda'}}},scales:{
    x:{ticks:{color:'#c8ccda'},grid:{color:'#222'}},
    y:{position:'left',ticks:{color:'#3b5bdb'},grid:{color:'#222'},title:{display:true,text:'직접ROAS',color:'#3b5bdb'}},
    y1:{position:'right',ticks:{color:'#f59f00'},grid:{drawOnChartArea:false},title:{display:true,text:'CPA',color:'#f59f00'}}}}});
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');render(t.dataset.b);});
document.querySelector('.tab').classList.add('on');render('grani');
</script></body></html>
