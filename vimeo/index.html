<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vimeo Bandwidth Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{ --bg:#0f1115; --card:#1a1d24; --line:#2a2e38; --txt:#e8eaed; --sub:#9aa0aa;
         --accent:#3b82f6; --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--txt); font-family:'Pretendard',-apple-system,'Segoe UI',sans-serif;
        line-height:1.5; padding:24px; max-width:1100px; margin:0 auto; }
  h1{ font-size:22px; font-weight:700; }
  .muted{ color:var(--sub); font-size:13px; }
  .grid{ display:grid; gap:16px; }
  .cards{ grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); margin:20px 0; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; }
  .card h3{ font-size:13px; color:var(--sub); font-weight:500; margin-bottom:8px; }
  .big{ font-size:28px; font-weight:700; }
  .unit{ font-size:14px; color:var(--sub); font-weight:500; }
  .bar{ height:10px; background:#2a2e38; border-radius:6px; overflow:hidden; margin-top:12px; }
  .bar > span{ display:block; height:100%; border-radius:6px; }
  table{ width:100%; border-collapse:collapse; }
  th,td{ text-align:left; padding:11px 12px; border-bottom:1px solid var(--line); font-size:14px; }
  th{ color:var(--sub); font-weight:500; user-select:none; }
  th.sortable{ cursor:pointer; }
  th.sortable:hover{ color:var(--txt); }
  th .arrow{ font-size:11px; opacity:.8; }
  td.num,th.num{ text-align:right; font-variant-numeric:tabular-nums; }
  .pill{ display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px; background:#3a2a2a; color:#f0a; }
  .teamtag{ display:inline-block; padding:1px 7px; border-radius:6px; font-size:12px; background:#222733; color:var(--sub); margin-left:6px; }
  .sec{ margin-top:28px; }
  .sec h2{ font-size:15px; margin-bottom:12px; font-weight:600; }
  canvas{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px; }
  a{ color:var(--accent); }
  .toolbar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
  input,select{ background:#11141a; border:1px solid var(--line); color:var(--txt);
    border-radius:9px; padding:9px 12px; font-size:14px; outline:none; }
  input:focus,select:focus{ border-color:var(--accent); }
  #search{ flex:1; min-width:160px; }
  .count{ font-size:12px; color:var(--sub); }
  .tabs{ display:flex; gap:8px; margin-bottom:14px; }
  .tab{ padding:8px 16px; border:1px solid var(--line); border-radius:10px; background:var(--card);
        color:var(--sub); cursor:pointer; font-size:14px; }
  .tab.active{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .split{ display:grid; grid-template-columns:1.3fr 1fr; gap:16px; align-items:start; }
  @media(max-width:760px){ .split{ grid-template-columns:1fr; } }
  /* 테마 커스터마이즈 */
  .theme-bar{ display:flex; justify-content:flex-end; }
  .theme-toggle{ background:var(--card); border:1px solid var(--line); color:var(--sub);
    border-radius:9px; padding:7px 12px; font-size:13px; cursor:pointer; }
  .theme-toggle:hover{ color:var(--txt); }
  .theme-panel{ background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px; margin-top:10px; display:none; }
  .theme-panel.open{ display:block; }
  .theme-row{ display:flex; flex-wrap:wrap; gap:18px; align-items:center; }
  .theme-row label{ display:flex; flex-direction:column; gap:6px; font-size:12px; color:var(--sub); }
  .theme-row input[type=color]{ width:46px; height:30px; padding:2px; border-radius:8px;
    border:1px solid var(--line); background:#11141a; cursor:pointer; }
  .preset-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; align-items:center; }
  .preset{ width:26px; height:26px; border-radius:50%; border:2px solid var(--line); cursor:pointer; }
  .preset:hover{ border-color:var(--txt); }
  .theme-reset{ background:transparent; border:1px solid var(--line); color:var(--sub);
    border-radius:8px; padding:6px 12px; font-size:12px; cursor:pointer; margin-left:auto; }
  .theme-reset:hover{ color:var(--txt); }
</style>
</head>
<body>
  <header class="grid" style="gap:4px">
    <h1>Vimeo Bandwidth Dashboard</h1>
    <div class="muted" id="updated"></div>
  </header>

  <div class="theme-bar">
    <button class="theme-toggle" id="themeToggle">테마 꾸미기</button>
  </div>
  <div class="theme-panel" id="themePanel">
    <div class="theme-row">
      <label>배경색 <input type="color" id="cBg"></label>
      <label>카드색 <input type="color" id="cCard"></label>
      <label>글자색 <input type="color" id="cTxt"></label>
      <label>강조색 <input type="color" id="cAccent"></label>
      <button class="theme-reset" id="themeReset">기본값으로</button>
    </div>
    <div class="preset-row">
      <span class="muted" style="font-size:12px">프리셋</span>
      <span class="preset" data-preset="dark"   style="background:#0f1115" title="다크"></span>
      <span class="preset" data-preset="light"  style="background:#f5f6f8" title="라이트"></span>
      <span class="preset" data-preset="navy"   style="background:#0b1f3a" title="네이비"></span>
      <span class="preset" data-preset="forest" style="background:#0e1f17" title="포레스트"></span>
      <span class="preset" data-preset="plum"   style="background:#1c0f1f" title="플럼"></span>
      <span class="preset" data-preset="sand"   style="background:#efe9dd" title="샌드"></span>
    </div>
  </div>

  <div class="grid cards">
    <div class="card">
      <h3>연간 누적 사용량</h3>
      <div><span class="big" id="usedTB">–</span> <span class="unit">/ <span id="capTB">–</span> TB</span></div>
      <div class="bar"><span id="capBar"></span></div>
      <div class="muted" id="capPct" style="margin-top:8px"></div>
    </div>
    <div class="card">
      <h3>선택 기간 합계</h3>
      <div><span class="big" id="weekSum">–</span> <span class="unit">GB</span></div>
      <div class="muted" id="weekRange" style="margin-top:8px"></div>
    </div>
    <div class="card">
      <h3>기록 주차</h3>
      <div class="big" id="weekCount" style="font-size:18px">–</div>
      <div class="muted" style="margin-top:8px">기준: Vimeo 애널리틱스 · 대역폭</div>
    </div>
  </div>

  <div class="sec">
    <div class="tabs">
      <div class="tab active" id="tabBrand">브랜드별</div>
      <div class="tab" id="tabTeam">팀별</div>
    </div>
    <div class="toolbar">
      <select id="weekStart" title="시작 주"></select>
      <span class="muted">~</span>
      <select id="weekEnd" title="종료 주"></select>
      <input id="search" placeholder="검색…" autocomplete="off">
      <span class="count" id="rowCount"></span>
    </div>
    <div class="split">
      <div class="card">
        <table id="mainTable">
          <thead><tr>
            <th id="thName" class="sortable">브랜드 <span class="arrow" id="arName"></span></th>
            <th id="thGB" class="sortable num">대역폭 (GB) <span class="arrow" id="arGB">▼</span></th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="card">
        <div class="muted" id="pieTitle" style="margin-bottom:8px">브랜드별 비중</div>
        <canvas id="pie" height="240"></canvas>
      </div>
    </div>
  </div>

  <div class="sec">
    <h2>주차별 추이</h2>
    <canvas id="trend" height="120"></canvas>
  </div>

  <div class="sec muted" style="margin-top:32px">
    연간 운영 목표 한도 1,000TB · 매주 금요일 전주(월~일) 자동 집계 ·
    Vimeo 콘텐츠 폴더별 대역폭 · 리칼지메디 미사용·mudit·onexia 제외
  </div>

<script>
const fmt = n => n==null ? "–" : n.toLocaleString("ko-KR",{maximumFractionDigits:1});
const PALETTE=["#3b82f6","#22c55e","#f59e0b","#ef4444","#a855f7","#14b8a6","#ec4899","#84cc16",
               "#06b6d4","#f97316","#6366f1","#10b981","#eab308","#f43f5e","#8b5cf6","#0ea5e9"];
const $ = id => document.getElementById(id);
let DATA=null, TEAM={}, weekStartIdx=0, weekEndIdx=0, q="", sortKey="gb", sortDir="desc", tab="brand";
let pieChart=null, trendChart=null;

// 선택된 주 범위(시작~종료, 순서 무관)의 주 객체 배열
function selWeeks(){
  const a=Math.min(weekStartIdx,weekEndIdx), b=Math.max(weekStartIdx,weekEndIdx);
  return DATA.주간기록.slice(a,b+1);
}

// 선택 범위의 브랜드별 대역폭 합산. 한 주도 숫자가 없으면 null(수집실패) 유지
function aggBrands(){
  const m={}, seen={};
  for(const w of selWeeks()){
    for(const [b,v] of Object.entries(w.브랜드)){
      if(!(b in m)){ m[b]=0; seen[b]=false; }
      if(typeof v==="number"){ m[b]+=v; seen[b]=true; }
    }
  }
  for(const b in m){ if(!seen[b]) m[b]=null; }
  return m;
}

function teamAgg(brands){
  const m={};
  for(const [b,v] of Object.entries(brands)){
    const t=TEAM[b]||"미지정";
    if(!(t in m)) m[t]=0;
    if(typeof v==="number") m[t]+=v;
  }
  return m;
}

function activeRows(){
  const brands=aggBrands();
  if(tab==="brand"){
    return Object.entries(brands).map(([name,gb])=>({name,gb,team:TEAM[name]||"미지정"}));
  } else {
    return Object.entries(teamAgg(brands)).map(([name,gb])=>({name,gb,team:null}));
  }
}

function renderTable(){
  let rows = activeRows();
  const term=q.trim().toLowerCase();
  if(term) rows=rows.filter(r=>r.name.toLowerCase().includes(term) || (r.team||"").toLowerCase().includes(term));
  rows.sort((a,b)=>{
    if(sortKey==="gb"){ const av=a.gb??-1, bv=b.gb??-1; return sortDir==="asc"?av-bv:bv-av; }
    return sortDir==="asc"? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
  });
  const tb=document.querySelector("#mainTable tbody");
  tb.innerHTML = rows.map(r=>{
    const tag = tab==="brand" ? `<span class="teamtag">${r.team}</span>` : "";
    const val = r.gb==null ? '<span class="pill">수집실패</span>' : fmt(r.gb);
    return `<tr><td>${r.name}${tag}</td><td class="num">${val}</td></tr>`;
  }).join("");
  $("rowCount").textContent = `${rows.length}개 ${tab==="brand"?"브랜드":"팀"}`;
  $("thName").firstChild.textContent = (tab==="brand"?"브랜드 ":"팀 ");
  $("arName").textContent = sortKey==="name" ? (sortDir==="asc"?"▲":"▼") : "";
  $("arGB").textContent   = sortKey==="gb"   ? (sortDir==="asc"?"▲":"▼") : "";
  const sum = activeRows().reduce((s,r)=>s+(typeof r.gb==="number"?r.gb:0),0);
  $("weekSum").textContent = fmt(sum);
  const ws=selWeeks();
  if(ws.length===1){
    $("weekRange").textContent = `${ws[0].주} (기록일 ${ws[0].기록일})`;
  } else {
    const from=ws[0].주.split(" ~ ")[0], to=ws[ws.length-1].주.split(" ~ ")[1];
    $("weekRange").textContent = `${from} ~ ${to} (${ws.length}주 합산)`;
  }
}

function renderPie(){
  let rows = activeRows().filter(r=>typeof r.gb==="number" && r.gb>0)
                         .sort((a,b)=>b.gb-a.gb);
  // 브랜드는 상위 12 + 기타
  if(tab==="brand" && rows.length>12){
    const top=rows.slice(0,12), rest=rows.slice(12).reduce((s,r)=>s+r.gb,0);
    rows=top.concat([{name:"기타",gb:rest}]);
  }
  $("pieTitle").textContent = (tab==="brand"?"브랜드별":"팀별") + " 비중";
  const labels=rows.map(r=>r.name), vals=rows.map(r=>r.gb);
  if(pieChart) pieChart.destroy();
  pieChart=new Chart($("pie"),{
    type:"doughnut",
    data:{ labels, datasets:[{ data:vals,
      backgroundColor:labels.map((_,i)=>PALETTE[i%PALETTE.length]), borderWidth:0 }] },
    options:{ responsive:true,
      plugins:{ legend:{ position:"right", labels:{ color:"#9aa0aa", boxWidth:12, font:{size:11} } },
        tooltip:{ callbacks:{ label:c=>{
          const t=c.dataset.data.reduce((s,v)=>s+v,0);
          return ` ${c.label}: ${fmt(c.parsed)} GB (${(c.parsed/t*100).toFixed(1)}%)`; } } } } }
  });
}

function renderTrend(){
  const weeks=DATA.주간기록;  // 오래된 주 → 최신 주 순(왼쪽=과거, 오른쪽=최신)
  const labels=weeks.map(w=>w.주.split(" ~ ")[0]);
  let keys, valOf;
  if(tab==="brand"){
    keys=[...new Set(weeks.flatMap(w=>Object.keys(w.브랜드)))];
    valOf=(w,k)=>w.브랜드[k];
  } else {
    const aggs=weeks.map(w=>teamAgg(w.브랜드));
    keys=[...new Set(aggs.flatMap(a=>Object.keys(a)))];
    valOf=(w,k,i)=>aggs[i][k];
  }
  const datasets=keys.map((k,i)=>({
    label:k, borderColor:PALETTE[i%PALETTE.length], backgroundColor:PALETTE[i%PALETTE.length],
    tension:.3, spanGaps:true,
    data: weeks.map((w,wi)=>valOf(w,k,wi))
  }));
  if(trendChart) trendChart.destroy();
  trendChart=new Chart($("trend"),{ type:"line", data:{labels,datasets},
    options:{ responsive:true,
      plugins:{ legend:{ labels:{ color:"#9aa0aa", boxWidth:12, font:{size:11} } } },
      scales:{ x:{ ticks:{color:"#9aa0aa"}, grid:{color:"#2a2e38"} },
               y:{ ticks:{color:"#9aa0aa"}, grid:{color:"#2a2e38"} } } }
  });
}

function renderAll(){ renderTable(); renderPie(); renderTrend(); }

function setTab(t){
  tab=t;
  $("tabBrand").classList.toggle("active", t==="brand");
  $("tabTeam").classList.toggle("active", t==="team");
  sortKey="gb"; sortDir="desc"; q=""; $("search").value="";
  $("search").placeholder = t==="brand" ? "브랜드 검색…" : "팀 검색…";
  renderAll();
}
function setSort(key){
  if(sortKey===key) sortDir = sortDir==="asc"?"desc":"asc";
  else { sortKey=key; sortDir = key==="gb"?"desc":"asc"; }
  renderTable();
}

/* ===== 테마 꾸미기 (배경색 등 자유 커스터마이즈, 브라우저에 저장) ===== */
const THEME_KEY="vimeoTheme";
const PRESETS={
  dark:  {bg:"#0f1115",card:"#1a1d24",line:"#2a2e38",txt:"#e8eaed",sub:"#9aa0aa",accent:"#3b82f6"},
  light: {bg:"#f5f6f8",card:"#ffffff",line:"#e2e5ea",txt:"#1a1d24",sub:"#6b7280",accent:"#3b82f6"},
  navy:  {bg:"#0b1f3a",card:"#13294d",line:"#244168",txt:"#e8eef7",sub:"#9fb3cc",accent:"#4f9cf9"},
  forest:{bg:"#0e1f17",card:"#13301f",line:"#244e36",txt:"#e6f2ea",sub:"#9cc0ab",accent:"#22c55e"},
  plum:  {bg:"#1c0f1f",card:"#2c1830",line:"#46294b",txt:"#f2e8f4",sub:"#c3a3c9",accent:"#a855f7"},
  sand:  {bg:"#efe9dd",card:"#fffdf7",line:"#ddd4c2",txt:"#2a2418",sub:"#7a7058",accent:"#b45309"},
};
let theme={...PRESETS.dark};
function applyTheme(){
  const r=document.documentElement.style;
  r.setProperty("--bg",theme.bg); r.setProperty("--card",theme.card);
  r.setProperty("--line",theme.line); r.setProperty("--txt",theme.txt);
  r.setProperty("--sub",theme.sub); r.setProperty("--accent",theme.accent);
  $("cBg").value=theme.bg; $("cCard").value=theme.card;
  $("cTxt").value=theme.txt; $("cAccent").value=theme.accent;
}
function saveTheme(){ try{ localStorage.setItem(THEME_KEY,JSON.stringify(theme)); }catch(e){} }
function loadTheme(){
  try{ const s=localStorage.getItem(THEME_KEY); if(s) theme={...PRESETS.dark,...JSON.parse(s)}; }catch(e){}
  applyTheme();
}
function bindTheme(){
  $("themeToggle").onclick=()=>$("themePanel").classList.toggle("open");
  const map={cBg:"bg",cCard:"card",cTxt:"txt",cAccent:"accent"};
  for(const [id,key] of Object.entries(map)){
    $(id).oninput=e=>{ theme[key]=e.target.value; applyTheme(); saveTheme(); };
  }
  document.querySelectorAll(".preset").forEach(el=>{
    el.onclick=()=>{ theme={...PRESETS[el.dataset.preset]}; applyTheme(); saveTheme(); };
  });
  $("themeReset").onclick=()=>{ theme={...PRESETS.dark}; applyTheme(); saveTheme(); };
}
loadTheme(); bindTheme();

Promise.all([
  fetch("data.json?v="+Date.now()).then(r=>r.json()),
  fetch("team_map.json?v="+Date.now()).then(r=>r.json()).catch(()=>({}))
]).then(([d,tm])=>{
  DATA=d; TEAM=tm;
  $("updated").textContent = "갱신 " + d.갱신시각;
  $("capTB").textContent = fmt(d.연간한도_TB);
  $("weekCount").textContent = (d.주간기록?.length||0) + "주";
  const usedTB=(d.전체누적_GB||0)/1000, pct=usedTB/d.연간한도_TB*100;
  $("usedTB").textContent = fmt(usedTB);
  const bar=$("capBar"); bar.style.width=Math.min(pct,100)+"%";
  bar.style.background = pct>=90?"var(--bad)":pct>=70?"var(--warn)":"var(--ok)";
  $("capPct").textContent = "한도의 "+pct.toFixed(1)+"% 사용";

  const last=d.주간기록.length-1;
  weekStartIdx=last; weekEndIdx=last;  // 기본: 최신 주 단독
  const opts=d.주간기록.map((w,i)=>`<option value="${i}">${w.주}</option>`).join("");
  const s1=$("weekStart"), s2=$("weekEnd");
  s1.innerHTML=opts; s2.innerHTML=opts;
  s1.value=last; s2.value=last;
  s1.onchange=e=>{ weekStartIdx=+e.target.value; renderAll(); };
  s2.onchange=e=>{ weekEndIdx=+e.target.value; renderAll(); };
  $("search").oninput=e=>{ q=e.target.value; renderTable(); };
  $("thName").onclick=()=>setSort("name");
  $("thGB").onclick=()=>setSort("gb");
  $("tabBrand").onclick=()=>setTab("brand");
  $("tabTeam").onclick=()=>setTab("team");
  renderAll();
}).catch(e=>{ $("updated").textContent="데이터를 불러오지 못했습니다: "+e; });
</script>
</body>
</html>
